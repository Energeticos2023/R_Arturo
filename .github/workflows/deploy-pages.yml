name: Deploy Arturo Mochumí to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android build tools
        shell: bash
        run: |
          yes | sdkmanager --licenses >/dev/null || true
          sdkmanager "platforms;android-35" "build-tools;35.0.0"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.11.1"

      - name: Build installable Android APK
        run: gradle --no-daemon --project-dir android assembleDebug

      - name: Rename APK
        shell: bash
        run: |
          mkdir -p apk-dist
          cp android/app/build/outputs/apk/debug/app-debug.apk apk-dist/Arturo-Mochumi.apk

      - name: Upload APK for Pages
        uses: actions/upload-artifact@v4
        with:
          name: arturo-mochumi-apk
          path: apk-dist/Arturo-Mochumi.apk

  build:
    needs: build-apk
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build static site
        shell: bash
        run: |
          cp vite.config.github.ts vite.config.ts
          cp next.config.github.ts next.config.ts
          npx vinext build

      - name: Download Android APK
        uses: actions/download-artifact@v4
        with:
          name: arturo-mochumi-apk
          path: dist/client

      - name: Prepare project-site paths
        shell: python
        run: |
          from pathlib import Path

          site = Path("dist/client")
          for path in site.rglob("*"):
              if not path.is_file():
                  continue
              if path.suffix not in {".html", ".js", ".css", ".json", ".webmanifest"}:
                  continue
              text = path.read_text(encoding="utf-8")
              text = text.replace('href="/', 'href="./')
              text = text.replace('src="/', 'src="./')
              text = text.replace('content="/', 'content="./')
              text = text.replace('import("/', 'import("./')
              text = text.replace('register("/sw.js")', 'register("./sw.js")')
              text = text.replace('"start_url": "/"', '"start_url": "./"')
              text = text.replace('"src": "/icon-', '"src": "./icon-')
              path.write_text(text, encoding="utf-8")

          (site / ".nojekyll").write_text("", encoding="utf-8")

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/client

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

